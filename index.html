    const decoder = new TextDecoder();

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function unlock() {
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");
      error.textContent = "";
      try {
        const baseKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: b64ToBytes(encryptedPayload.salt),
            iterations: Number(encryptedPayload.iterations),
            hash: "SHA-256"
          },
          baseKey,
          {name: "AES-GCM", length: 256},
          false,
          ["decrypt"]
        );
        const plaintext = await crypto.subtle.decrypt(
          {name: "AES-GCM", iv: b64ToBytes(encryptedPayload.nonce)},
          key,
          b64ToBytes(encryptedPayload.ciphertext)
        );
        document.open();
        document.write(decoder.decode(plaintext));
        document.close();
      } catch (_err) {
        error.textContent = "Password 不对，或者这个文件已损坏。";
      }
    }

    document.getElementById("unlock").addEventListener("click", unlock);
    document.getElementById("password").addEventListener("keydown", event => {
      if (event.key === "Enter") unlock();
    });
